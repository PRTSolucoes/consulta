<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Painel - PRT Soluções</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 30px;
      width: 350px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #2f5be7;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 6px;
    }

    button:hover {
      background: #1d44c7;
    }

    #resultado {
      margin-top: 20px;
      font-weight: bold;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }

    .sucesso {
      background: #d4edda;
      color: #155724;
    }

    .erro {
      background: #f8d7da;
      color: #721c24;
    }

    .loading {
      background: #fff3cd;
      color: #856404;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enviar Email</h2>

  <input 
    type="number" 
    id="numero" 
    placeholder="Digite o número do Ticket"
    onkeypress="if(event.key === 'Enter') enviar()"
  >

  <button onclick="enviar()">Enviar</button>

  <div id="resultado"></div>
</div>

<script>
function enviar() {
  var numero = document.getElementById("numero").value;
  var resultado = document.getElementById("resultado");

  if (!numero) {
    resultado.style.display = "block";
    resultado.className = "erro";
    resultado.innerText = "Digite um número.";
    return;
  }

  resultado.style.display = "block";
  resultado.className = "loading";
  resultado.innerText = "Enviando email...";

  fetch("https://prtsolucoes.app.n8n.cloud/webhook-test/consulta", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      numero: numero
    })
  })
  .then(response => response.json())
  .then(data => {
    if (data.status === "sucesso") {
      resultado.className = "sucesso";
      resultado.innerText = data.mensagem;
    } else {
      resultado.className = "erro";
      resultado.innerText = data.mensagem || "Erro ao enviar.";
    }
  })
  .catch(error => {
    resultado.className = "erro";
    resultado.innerText = "Erro de conexão com o servidor.";
  });
}
</script>

</body>
</html>
