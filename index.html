<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Consulta</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      margin-top: 100px;
    }
    .box {
      background: white;
      padding: 30px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Consultar Ticket</h2>
  <input type="text" id="numero" placeholder="Digite o número do Ticket">
  <button onclick="enviar()">Consultar</button>
  <p id="resultado"></p>
</div>

<script>
function enviar() {
  var numero = document.getElementById("numero").value;

  fetch("https://SEU-N8N/webhook/consulta", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      numero: numero
    })
  })
  .then(response => response.json())
  .then(data => {
    document.getElementById("resultado").innerText = data.resultado;
  });
}
</script>

</body>
</html>
